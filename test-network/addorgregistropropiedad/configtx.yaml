---
################################################################################
#
#   Section: Organizations
#
#   - This section defines the different organizational identities which will
#   be referenced later in the configuration.
#
################################################################################
Organizations:
    - &Orgregistropropiedad
        # DefaultOrg defines the organization which is used in the sampleconfig
        # of the fabric.git development environment
        Name: OrgregistropropiedadMSP

        # ID to load the MSP definition as
        ID: OrgregistropropiedadMSP

        MSPDir: ../organizations/peerOrganizations/orgregistropropiedad.example.com/msp

        Policies:
            Readers:
                Type: Signature
                Rule: "OR('OrgregistropropiedadMSP.admin', 'OrgregistropropiedadMSP.peer', 'OrgregistropropiedadMSP.client')"
            Writers:
                Type: Signature
                Rule: "OR('OrgregistropropiedadMSP.admin', 'OrgregistropropiedadMSP.client')"
            Admins:
                Type: Signature
                Rule: "OR('OrgregistropropiedadMSP.admin')"
            Endorsement:
                Type: Signature
                Rule: "OR('OrgregistropropiedadMSP.peer')"
